name: Build and Push Docker Images

on:
  push:
    branches:
      - internal/deploy-pagopa
    paths:
      - 'auth/Dockerfile'
      - 'auth/src/**'
      - 'auth/pyproject.toml'
      - 'auth/requirements.txt'
      - 'chatbot-api/Dockerfile'
      - 'chatbot-api/src/**'
      - 'chatbot-api/pyproject.toml'
      - 'chatbot-api/requirements.txt'
      - 'chatbot-evaluate/api/Dockerfile'
      - 'chatbot-evaluate/api/src/**'
      - 'chatbot-evaluate/api/pyproject.toml'
      - 'chatbot-evaluate/api/requirements.txt'
      - 'chatbot-evaluate/worker/Dockerfile'
      - 'chatbot-evaluate/worker/src/**'
      - 'chatbot-evaluate/worker/pyproject.toml'
      - 'chatbot-evaluate/worker/requirements.txt'
      - 'chatbot-index/api/Dockerfile'
      - 'chatbot-index/api/src/**'
      - 'chatbot-index/api/pyproject.toml'
      - 'chatbot-index/api/requirements.txt'
      - 'chatbot-index/worker/Dockerfile'
      - 'chatbot-index/worker/src/**'
      - 'chatbot-index/worker/pyproject.toml'
      - 'chatbot-index/worker/requirements.txt'
      - 'masking/Dockerfile'
      - 'masking/src/**'
      - 'masking/pyproject.toml'
      - 'masking/requirements.txt'
      - 'dos-utility/src/**'
      - 'dos-utility/pyproject.toml'
      - '.github/workflows/cd-internal-pagopa.yaml'

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            auth:
              - 'auth/**'
              - 'dos-utility/**'
            chatbot-api:
              - 'chatbot-api/**'
              - 'dos-utility/**'
            chatbot-evaluate-api:
              - 'chatbot-evaluate/api/**'
              - 'dos-utility/**'
            chatbot-evaluate-worker:
              - 'chatbot-evaluate/worker/**'
              - 'dos-utility/**'
            chatbot-index-api:
              - 'chatbot-index/api/**'
              - 'dos-utility/**'
            chatbot-index-worker:
              - 'chatbot-index/worker/**'
              - 'dos-utility/**'
            masking:
              - 'masking/**'
              - 'dos-utility/**'

      - id: set-matrix
        run: |
          MATRIX=$(cat <<'EOF'
          {
            "include": [
              $( [ "${{ steps.changes.outputs.auth }}" = "true" ] && echo '{"service": "auth", "dockerfile": "auth/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.chatbot-api }}" = "true" ] && echo '{"service": "chatbot-api", "dockerfile": "chatbot-api/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.chatbot-evaluate-api }}" = "true" ] && echo '{"service": "chatbot-evaluate-api", "dockerfile": "chatbot-evaluate/api/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.chatbot-evaluate-worker }}" = "true" ] && echo '{"service": "chatbot-evaluate-worker", "dockerfile": "chatbot-evaluate/worker/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.chatbot-index-api }}" = "true" ] && echo '{"service": "chatbot-index-api", "dockerfile": "chatbot-index/api/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.chatbot-index-worker }}" = "true" ] && echo '{"service": "chatbot-index-worker", "dockerfile": "chatbot-index/worker/Dockerfile"},'),
              $( [ "${{ steps.changes.outputs.masking }}" = "true" ] && echo '{"service": "masking", "dockerfile": "masking/Dockerfile"}')
            ]
          }
          EOF
          )
          echo "matrix=$(echo $MATRIX | jq -c 'del(.include[] | select(. == null)) | .include')" >> $GITHUB_OUTPUT

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=pagopa

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
