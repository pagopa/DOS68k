# DOS68K — local development stack.
#
# This file boots the platform with the providers selected by the shipped
# .env.template files (NoSQL=DynamoDB via LocalStack, Queue+Vector DB=Redis,
# Storage=MinIO, Auth=local, Tracing=noop).
#
# Optional backends and dev-only tools are kept in this file but commented
# out, so what runs by default matches what is configured. To enable one:
#
#   * Qdrant vector DB    → uncomment the `qdrant` service block AND add
#                            `qdrant` back to the depends_on of chatbot-api,
#                            chatbot-index-api, and chatbot-index-worker.
#                            Then set VECTOR_DB_PROVIDER=qdrant in the
#                            relevant .env files.
#   * Langfuse tracing    → uncomment the `db`, `langfuse-worker`,
#                            `langfuse-web`, `clickhouse`, and `valkey`
#                            blocks (and the matching volumes), add
#                            `langfuse-web` back to chatbot-api's
#                            depends_on, and set TRACING_PROVIDER=langfuse
#                            in chatbot-api/.env.
#   * dynamodb-admin UI   → uncomment the `dynamodb-admin` block. It is a
#                            debugging UI for inspecting DynamoDB; not
#                            required by the platform.
services:
  api-gateway:
    image: traefik:v3.2@sha256:e561a37f8710d9cf41c78bdf421d822b2c0b48267ec0552e644565fb55466ea9
    ports:
      - 8080:8080
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      - auth
      - chatbot-api
      - chatbot-evaluate-api
      - chatbot-index-api
      - masking

  auth:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
    env_file:
      - ./auth/.env
    ports:
      - 3000:3000

  chatbot-api:
    build:
      context: .
      dockerfile: ./chatbot-api/Dockerfile
    env_file:
      - ./chatbot-api/.env
    ports:
      - 8000:8000
    # Uncomment the volumes below to mount custom RAG tool configs or a custom agent config.
    # See chatbot-api/README.md#customisation for details.
    volumes:
      - ./chatbot-api/scripts/tool_config:/app/src/modules/chatbot/tool/config
    #   - ./my-agent.yaml:/app/src/modules/chatbot/agent/agent.yaml
    depends_on:
      - localstack
      - masking
      - redis-vdb
      # - qdrant         # uncomment when VECTOR_DB_PROVIDER=qdrant
      # - langfuse-web   # uncomment when TRACING_PROVIDER=langfuse

  chatbot-evaluate-api:
    build:
      context: .
      dockerfile: ./chatbot-evaluate/api/Dockerfile
    env_file:
      - ./chatbot-evaluate/api/.env
    ports:
      - 8002:8000
    depends_on:
      - redis-queue
      - redis-vdb
      - localstack
      - chatbot-evaluate-worker

  chatbot-evaluate-worker:
    build:
      context: .
      dockerfile: ./chatbot-evaluate/worker/Dockerfile
    env_file:
      - ./chatbot-evaluate/worker/.env
    depends_on:
      - redis-queue
      - localstack

  chatbot-index-api:
    build:
      context: .
      dockerfile: ./chatbot-index/api/Dockerfile
    env_file:
      - ./chatbot-index/api/.env
    ports:
      - 8003:8000
    depends_on:
      - redis-queue
      - minio
      - redis-vdb
      # - qdrant         # uncomment when VECTOR_DB_PROVIDER=qdrant
      - localstack
      - chatbot-index-worker

  chatbot-index-worker:
    build:
      context: .
      dockerfile: ./chatbot-index/worker/Dockerfile
    env_file:
      - ./chatbot-index/worker/.env
    depends_on:
      - redis-queue
      - minio
      - redis-vdb
      # - qdrant         # uncomment when VECTOR_DB_PROVIDER=qdrant
      - localstack

  masking:
    build:
      context: .
      dockerfile: ./masking/Dockerfile
    ports:
      - 3001:3000

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    environment:
      # The frontend talks to the backend through the API gateway (Traefik), not
      # to chatbot-api directly — only the gateway exposes every route (sessions,
      # queries, index, documents, health) and applies forward-auth.
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - 80:80
    depends_on:
      - api-gateway

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    env_file:
      - ./.env.storage

  # One-shot job: create the document bucket in MinIO so the first upload
  # succeeds. MinIO does not auto-create buckets and nothing else provisions
  # one. The bucket name must match INDEX_DOCUMENTS_BUCKET_NAME in the
  # chatbot-index api and worker .env files (default: documents). Credentials
  # come from ./.env.storage (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file:
      - ./.env.storage
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do echo 'waiting for minio...'; sleep 2; done;
      mc mb --ignore-existing local/documents;
      echo 'bucket ready';
      "

  redis-vdb:
    image: redis/redis-stack:7.4.0-v8@sha256:5d5154123426693540ea6c1d9e638eae2bf2024879c839db6fcfdd7717e817c7
    ports:
      - 6379:6379
      - 8001:8001
    volumes:
      - redis_vdb_data:/data

  redis-queue:
    image: redis:8.4@sha256:0cf7723388c29e8a936a9a1502f3fdfc8fec0688ffca8875d8e87940bec045eb
    ports:
      - 6380:6379
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  localstack:
    image: localstack/localstack@sha256:bcbf91685f1157de81a76de9dc7ad20741f6b7b896e0f61a24ac89c7fb0c4b4d
    ports:
      - 4566:4566
    env_file:
      - ./.env.localstack
    volumes:
      - localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init/ready.d:/etc/localstack/init/ready.d

  # ---------------------------------------------------------------------------
  # Optional services — disabled by default.
  # Uncomment the block(s) you need and follow the matching note at the top
  # of this file (depends_on / env vars).
  # ---------------------------------------------------------------------------

  # Alternative vector DB. Enable when VECTOR_DB_PROVIDER=qdrant.
  # qdrant:
  #   image: qdrant/qdrant:latest@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
