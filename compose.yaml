volumes:
  minio_data:
    driver: local
  redis_data:
    driver: local
  redis_vdb_data:
    driver: local
  localstack:
    driver: local
  # Uncomment these when you enable the matching optional services above.
  # qdrant:
  #   driver: local
  # db_data:
  #   driver: local
  # langfuse_clickhouse_data:
  #   driver: local
  # langfuse_clickhouse_logs:
  #   driver: local
